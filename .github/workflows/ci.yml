name: Makefile CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: |
        uv sync 
        uv pip install -e .
    
    - name: run checks
      run: |
        make checks